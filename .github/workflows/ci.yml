name: skip-salt
on:
  push:
    branches: [ main ]
    tags: "[0-9]+.[0-9]+.[0-9]+"
  schedule:
    - cron:  '0 4 * * *'
  workflow_dispatch:
  pull_request:

permissions:
  contents: write

jobs:
  call-workflow:
    uses: skiptools/actions/.github/workflows/skip-framework.yml@main
    with:
      #runs-on: "['macos-15-intel', 'ubuntu-24.04']"
      #apt-install: libsodium-dev
      brew-install: libsodium
